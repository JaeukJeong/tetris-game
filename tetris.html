<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Tetris by You</title>
    <style>
        body { background: #111; color: #fff; font-family: Arial; text-align: center; }
        canvas { border: 2px solid #fff; background: #000; }
        #info { margin: 10px; font-size: 20px; }
    </style>
</head>
<body>
    <h1>My Java-Inspired Tetris!</h1>
    <div id="info">
        Score: <span id="score">0</span> | Level: <span id="level">1</span>
        <br>← → ↓: Move | ↑: Rotate | Space: Hard Drop
    </div>
    <canvas id="canvas" width="300" height="600"></canvas>
    <script>
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');
        const BLOCK_SIZE = 30;
        const COLS = 10;
        const ROWS = 20;
        let board = Array(ROWS).fill().map(() => Array(COLS).fill(0));
        let score = 0;
        let level = 1;
        let dropTime = 0;
        let dropInterval = 1000;

        const PIECES = [
            [[1,1,1,1]], // I
            [[1,1],[1,1]], // O
            [[1,1,1],[0,1,0]], // T
            [[0,1,1],[1,1,0]], // S
            [[1,1,0],[0,1,1]], // Z
            [[1,1,1],[1,0,0]], // J
            [[1,1,1],[0,0,1]]  // L
        ];

        let currentPiece = { shape: PIECES[Math.floor(Math.random()*7)], x: 3, y: 0, rot: 0 };
        let nextPiece = { shape: PIECES[Math.floor(Math.random()*7)] };

        function rotate(piece) {
            const rotated = piece.shape[0].map((_, i) => piece.shape.map(row => row[i]).reverse());
            return { ...piece, shape: rotated, rot: (piece.rot + 1) % 4 };
        }

        function validMove(piece, dx=0, dy=0, newShape=null) {
            const shape = newShape || piece.shape;
            for (let y = 0; y < shape.length; y++) {
                for (let x = 0; x < shape[y].length; x++) {
                    if (shape[y][x]) {
                        const newX = piece.x + x + dx;
                        const newY = piece.y + y + dy;
                        if (newX < 0 || newX >= COLS || newY >= ROWS || (newY >= 0 && board[newY][newX])) {
                            return false;
                        }
                    }
                }
            }
            return true;
        }

        function placePiece() {
            for (let y = 0; y < currentPiece.shape.length; y++) {
                for (let x = 0; x < currentPiece.shape[y].length; x++) {
                    if (currentPiece.shape[y][x]) {
                        board[currentPiece.y + y][currentPiece.x + x] = 1;
                    }
                }
            }
            clearLines();
            currentPiece = { ...nextPiece, x: 3, y: 0, rot: 0 };
            nextPiece = { shape: PIECES[Math.floor(Math.random()*7)] };
            if (!validMove(currentPiece)) {
                alert('Game Over! Score: ' + score);
                board = Array(ROWS).fill().map(() => Array(COLS).fill(0));
                score = 0;
                level = 1;
            }
        }

        function clearLines() {
            for (let y = ROWS - 1; y >= 0; y--) {
                if (board[y].every(cell => cell)) {
                    board.splice(y, 1);
                    board.unshift(Array(COLS).fill(0));
                    score += 100 * level;
                    level = Math.floor(score / 1000) + 1;
                    dropInterval = Math.max(50, 1000 - level * 50);
                    y++; // Re-check this row
                }
            }
            document.getElementById('score').textContent = score;
            document.getElementById('level').textContent = level;
        }

        function drawBoard() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            // Draw board
            for (let y = 0; y < ROWS; y++) {
                for (let x = 0; x < COLS; x++) {
                    if (board[y][x]) {
                        ctx.fillStyle = '#0f0';
                        ctx.fillRect(x * BLOCK_SIZE, y * BLOCK_SIZE, BLOCK_SIZE, BLOCK_SIZE);
                        ctx.strokeStyle = '#000';
                        ctx.strokeRect(x * BLOCK_SIZE, y * BLOCK_SIZE, BLOCK_SIZE, BLOCK_SIZE);
                    }
                }
            }
            // Draw current piece
            ctx.fillStyle = '#ff0';
            for (let y = 0; y < currentPiece.shape.length; y++) {
                for (let x = 0; x < currentPiece.shape[y].length; x++) {
                    if (currentPiece.shape[y][x]) {
                        ctx.fillRect((currentPiece.x + x) * BLOCK_SIZE, (currentPiece.y + y) * BLOCK_SIZE, BLOCK_SIZE, BLOCK_SIZE);
                        ctx.strokeStyle = '#000';
                        ctx.strokeRect((currentPiece.x + x) * BLOCK_SIZE, (currentPiece.y + y) * BLOCK_SIZE, BLOCK_SIZE, BLOCK_SIZE);
                    }
                }
            }
        }

        function update(time = 0) {
            const deltaTime = time - dropTime;
            if (deltaTime > dropInterval) {
                if (validMove(currentPiece, 0, 1)) {
                    currentPiece.y++;
                } else {
                    placePiece();
                }
                dropTime = time;
            }
            drawBoard();
            requestAnimationFrame(update);
        }

        document.addEventListener('keydown', e => {
            switch(e.key) {
                case 'ArrowLeft': if (validMove(currentPiece, -1)) currentPiece.x--; break;
                case 'ArrowRight': if (validMove(currentPiece, 1)) currentPiece.x++; break;
                case 'ArrowDown': if (validMove(currentPiece, 0, 1)) currentPiece.y++; break;
                case 'ArrowUp':
                    const rotated = rotate(currentPiece);
                    if (validMove(currentPiece, 0, 0, rotated.shape)) currentPiece = rotated;
                    break;
                case ' ': // Hard drop
                    while (validMove(currentPiece, 0, 1)) currentPiece.y++;
                    placePiece();
                    break;
            }
        });

        update();
    </script>
</body>
</html>
