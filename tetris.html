<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mobile Tetris by You</title>
    <style>
        body { 
            background: #111; color: #fff; font-family: Arial; text-align: center; 
            margin: 0; padding: 10px; touch-action: none; /* Prevents zoom/scroll */
        }
        canvas { border: 2px solid #fff; background: #000; touch-action: none; }
        #info { margin: 10px; font-size: 20px; }
        #controls { margin: 10px; }
        button { 
            font-size: 24px; width: 60px; height: 60px; margin: 5px; 
            background: #444; color: #fff; border: 2px solid #fff; border-radius: 10px;
            touch-action: manipulation;
        }
        button:active { background: #666; }
        @media (min-width: 500px) { /* Bigger on desktop */
            button { font-size: 28px; width: 70px; height: 70px; }
        }
    </style>
</head>
<body>
    <h1>My Mobile Tetris!</h1>
    <div id="info">
        Score: <span id="score">0</span> | Level: <span id="level">1</span>
    </div>
    <canvas id="canvas" width="300" height="600"></canvas>
    <div id="controls">
        <button id="left">←</button>
        <button id="rot">↻</button>
        <button id="right">→</button>
        <br>
        <button id="down">↓</button>
        <button id="drop">💥</button>
    </div>

    <script>
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');
        const BLOCK_SIZE = 30;
        const COLS = 10;
        const ROWS = 20;
        let board = Array(ROWS).fill().map(() => Array(COLS).fill(0));
        let score = 0;
        let level = 1;
        let dropTime = 0;
        let dropInterval = 1000;

        const PIECES = [
            [[1,1,1,1]], // I
            [[1,1],[1,1]], // O
            [[1,1,1],[0,1,0]], // T
            [[0,1,1],[1,1,0]], // S
            [[1,1,0],[0,1,1]], // Z
            [[1,1,1],[1,0,0]], // J
            [[1,1,1],[0,0,1]]  // L
        ];

        let currentPiece = { shape: PIECES[Math.floor(Math.random()*7)], x: 3, y: 0, rot: 0 };
        let nextPiece = { shape: PIECES[Math.floor(Math.random()*7)] };

        // Touch swipe vars
        let touchStartX = 0, touchStartY = 0;

        function rotate(piece) {
            const rotated = piece.shape[0].map((_, i) => piece.shape.map(row => row[i]).reverse());
            return { ...piece, shape: rotated, rot: (piece.rot + 1) % 4 };
        }

        function validMove(piece, dx=0, dy=0, newShape=null) {
            const shape = newShape || piece.shape;
            for (let y = 0; y < shape.length; y++) {
                for (let x = 0; x < shape[y].length; x++) {
                    if (shape[y][x]) {
                        const newX = piece.x + x + dx;
                        const newY = piece.y + y + dy;
                        if (newX < 0 || newX >= COLS || newY >= ROWS || (newY >= 0 && board[newY][newX])) {
                            return false;
                        }
                    }
                }
            }
            return true;
        }

        function placePiece() {
            for (let y = 0; y < currentPiece.shape.length; y++) {
                for (let x = 0; x < currentPiece.shape[y].length; x++) {
                    if (currentPiece.shape[y][x]) {
                        board[currentPiece.y + y][currentPiece.x + x] = 1;
                    }
                }
            }
            clearLines();
            currentPiece = { ...nextPiece, x: 3, y: 0, rot: 0 };
            nextPiece = { shape: PIECES[Math.floor(Math.random()*7)] };
            if (!validMove(currentPiece)) {
                alert('Game Over! Score: ' + score + '\nTap OK to restart.');
                board = Array(ROWS).fill().map(() => Array(COLS).fill(0));
                score = 0;
                level = 1;
                dropInterval = 1000;
            }
        }

        function clearLines() {
            for (let y = ROWS - 1; y >= 0; y--) {
                if (board[y].every(cell => cell)) {
                    board.splice(y, 1);
                    board.unshift(Array(COLS).fill(0));
                    score += 100 * level;
                    level = Math.floor(score / 1000) + 1;
                    dropInterval = Math.max(50, 1000 - level * 50);
                    y++;
                }
            }
            document.getElementById('score').textContent = score;
            document.getElementById('level').textContent = level;
        }

        function drawBoard() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            for (let y = 0; y < ROWS; y++) {
                for (let x = 0; x < COLS; x++) {
                    if (board[y][x]) {
                        ctx.fillStyle = '#0f0';
                        ctx.fillRect(x * BLOCK_SIZE, y * BLOCK_SIZE, BLOCK_SIZE - 1, BLOCK_SIZE - 1);
                        ctx.strokeStyle = '#333';
                        ctx.strokeRect(x * BLOCK_SIZE, y * BLOCK_SIZE, BLOCK_SIZE, BLOCK_SIZE);
                    }
                }
            }
            ctx.fillStyle = '#ff0';
            for (let y = 0; y < currentPiece.shape.length; y++) {
                for (let x = 0; x < currentPiece.shape[y].length; x++) {
                    if (currentPiece.shape[y][x]) {
                        ctx.fillRect((currentPiece.x + x) * BLOCK_SIZE, (currentPiece.y + y) * BLOCK_SIZE, BLOCK_SIZE - 1, BLOCK_SIZE - 1);
                        ctx.strokeStyle = '#333';
                        ctx.strokeRect((currentPiece.x + x) * BLOCK_SIZE, (currentPiece.y + y) * BLOCK_SIZE, BLOCK_SIZE, BLOCK_SIZE);
                    }
                }
            }
        }

        function moveLeft() { if (validMove(currentPiece, -1)) currentPiece.x--; }
        function moveRight() { if (validMove(currentPiece, 1)) currentPiece.x++; }
        function moveDown() { if (validMove(currentPiece, 0, 1)) currentPiece.y++; }
        function doRotate() {
            const rotated = rotate(currentPiece);
            if (validMove(currentPiece, 0, 0, rotated.shape)) currentPiece = rotated;
        }
        function hardDrop() {
            while (validMove(currentPiece, 0, 1)) currentPiece.y++;
            placePiece();
        }

        // Keyboard (desktop)
        document.addEventListener('keydown', e => {
            e.preventDefault();
            switch(e.key) {
                case 'ArrowLeft': moveLeft(); break;
                case 'ArrowRight': moveRight(); break;
                case 'ArrowDown': moveDown(); break;
                case 'ArrowUp': doRotate(); break;
                case ' ': hardDrop(); break;
            }
        });

        // Buttons (mobile/desktop)
        document.getElementById('left').addEventListener('click', moveLeft);
        document.getElementById('right').addEventListener('click', moveRight);
        document.getElementById('down').addEventListener('click', moveDown);
        document.getElementById('rot').addEventListener('click', doRotate);
        document.getElementById('drop').addEventListener('click', hardDrop);

        // Touch swipe (bonus for mobile)
        canvas.addEventListener('touchstart', e => {
            e.preventDefault();
            const touch = e.touches[0];
            touchStartX = touch.clientX;
            touchStartY = touch.clientY;
        });
        canvas.addEventListener('touchend', e => {
            e.preventDefault();
            const touch = e.changedTouches[0];
            const deltaX = touch.clientX - touchStartX;
            const deltaY = touch.clientY - touchStartY;
            if (Math.abs(deltaX) > 30) { // Swipe horizontal
                if (deltaX > 0) moveRight(); else moveLeft();
            } else if (deltaY > 30) { // Swipe down
                hardDrop();
            } else if (deltaY < -30) { // Swipe up
                doRotate();
            }
        });

        function update(time = 0) {
            const deltaTime = time - dropTime;
            if (deltaTime > dropInterval) {
                moveDown(); // Auto-drop uses moveDown now
                dropTime = time;
            }
            drawBoard();
            requestAnimationFrame(update);
        }

        canvas.focus(); // Auto-focus canvas
        update();
    </script>
</body>
</html>
